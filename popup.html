<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capture</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="title">Capture</h1>
      <div class="subtitle">Professional screenshot tool</div>
    </header>

    <div class="actions">
      <button id="captureViewport" class="action-btn" data-mode="viewport">
        <svg class="action-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
          <circle cx="8.5" cy="8.5" r="1.5"></circle>
          <polyline points="21 15 16 10 5 21"></polyline>
        </svg>
        <div class="action-content">
          <div class="action-title">Viewport</div>
          <div class="action-desc">Visible area</div>
        </div>
      </button>

      <button id="captureFullPage" class="action-btn" data-mode="fullpage">
        <svg class="action-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
          <polyline points="10 9 9 9 8 9"></polyline>
        </svg>
        <div class="action-content">
          <div class="action-title">Full Page</div>
          <div class="action-desc">Entire document</div>
        </div>
      </button>
    </div>

    <div id="status" class="status hidden">
      <div class="status-spinner"></div>
      <span class="status-text"></span>
    </div>

    <footer class="footer">
      <div class="footer-text">Created with <span class="footer-heart">♡</span> Aditya Kate</div>
    </footer>
  </div>

  <div id="preview" class="preview hidden">
    <div class="preview-overlay"></div>
    <div class="preview-container">
      <div class="preview-header">
        <div class="preview-title">Preview</div>
        <button id="closePreview" class="preview-close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>

      <div class="preview-content">
        <div class="preview-image-wrapper">
          <img id="previewImage" alt="Screenshot preview">
        </div>
      </div>

      <div class="preview-actions">
        <button id="copyToClipboard" class="preview-btn preview-btn-primary">
          <svg class="preview-btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
          <span class="preview-btn-text">Copy</span>
        </button>

        <button id="downloadImage" class="preview-btn preview-btn-secondary">
          <svg class="preview-btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          <span class="preview-btn-text">Download</span>
        </button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
