<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate Extension Icons</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            margin-top: 0;
            color: #333;
        }
        .icons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .icon-item {
            text-align: center;
        }
        canvas {
            border: 1px solid #ddd;
            border-radius: 8px;
            background: white;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
        }
        button:hover {
            background: #45a049;
        }
        .download-btn {
            background: #2196F3;
        }
        .download-btn:hover {
            background: #0b7dda;
        }
        p {
            color: #666;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📸 Extension Icon Generator</h1>
        <p>Modern, professional icons for your screenshot extension. Click "Download All" to save all sizes.</p>

        <div class="icons-grid">
            <div class="icon-item">
                <canvas id="icon16" width="16" height="16"></canvas>
                <p>16x16</p>
            </div>
            <div class="icon-item">
                <canvas id="icon32" width="32" height="32"></canvas>
                <p>32x32</p>
            </div>
            <div class="icon-item">
                <canvas id="icon48" width="48" height="48"></canvas>
                <p>48x48</p>
            </div>
            <div class="icon-item">
                <canvas id="icon128" width="128" height="128"></canvas>
                <p>128x128</p>
            </div>
        </div>

        <div style="text-align: center;">
            <button class="download-btn" onclick="downloadAll()">Download All Icons</button>
        </div>
    </div>

    <script>
        function drawIcon(canvas) {
            const ctx = canvas.getContext('2d');
            const size = canvas.width;

            // Clear canvas
            ctx.clearRect(0, 0, size, size);

            // Light minimal background
            ctx.fillStyle = '#f8f9fa';
            ctx.fillRect(0, 0, size, size);

            // Calculate proportions
            const padding = size * 0.2;
            const iconSize = size - (padding * 2);

            // Draw camera body (rounded rectangle) - outline style
            ctx.strokeStyle = '#2c3e50';
            ctx.lineWidth = Math.max(2, size * 0.06);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            const bodyX = padding;
            const bodyY = padding + iconSize * 0.15;
            const bodyWidth = iconSize;
            const bodyHeight = iconSize * 0.7;
            const radius = size * 0.1;

            // Camera body outline
            ctx.beginPath();
            ctx.roundRect(bodyX, bodyY, bodyWidth, bodyHeight, radius);
            ctx.stroke();

            // Lens (circle outline)
            const lensX = size / 2;
            const lensY = bodyY + bodyHeight / 2;
            const lensRadius = iconSize * 0.22;

            ctx.beginPath();
            ctx.arc(lensX, lensY, lensRadius, 0, Math.PI * 2);
            ctx.stroke();

            // Inner lens detail
            ctx.beginPath();
            ctx.arc(lensX, lensY, lensRadius * 0.5, 0, Math.PI * 2);
            ctx.stroke();

            // Viewfinder bump on top
            const bumpWidth = iconSize * 0.3;
            const bumpHeight = iconSize * 0.12;
            const bumpX = size / 2 - bumpWidth / 2;
            const bumpY = padding;

            ctx.beginPath();
            ctx.roundRect(bumpX, bumpY, bumpWidth, bumpHeight, radius * 0.5);
            ctx.stroke();

            // Shutter button (small circle)
            if (size >= 32) {
                const shutterX = bodyX + bodyWidth - iconSize * 0.15;
                const shutterY = bodyY + iconSize * 0.12;
                const shutterRadius = iconSize * 0.06;

                ctx.fillStyle = '#3498db';
                ctx.beginPath();
                ctx.arc(shutterX, shutterY, shutterRadius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Draw all icons
        ['icon16', 'icon32', 'icon48', 'icon128'].forEach(id => {
            const canvas = document.getElementById(id);
            drawIcon(canvas);
        });

        function downloadCanvas(canvas, filename) {
            const link = document.createElement('a');
            link.download = filename;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        function downloadAll() {
            const sizes = [
                { id: 'icon16', name: 'icon16.png' },
                { id: 'icon32', name: 'icon32.png' },
                { id: 'icon48', name: 'icon48.png' },
                { id: 'icon128', name: 'icon128.png' }
            ];

            sizes.forEach((item, index) => {
                setTimeout(() => {
                    const canvas = document.getElementById(item.id);
                    downloadCanvas(canvas, item.name);
                }, index * 200);
            });

            alert('Icons will download shortly! Save them to the icons/ folder in your extension directory.');
        }
    </script>
</body>
</html>
